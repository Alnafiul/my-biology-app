<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; background-color: #f9f9f9; }
        .payment-box { background: white; padding: 20px; border-left: 5px solid #008080; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #008080; color: white; }
        .btn-approve { background: #28a745; color: white; padding: 8px 15px; cursor: pointer; border: none; border-radius: 5px; }
        .btn-approve:hover { background: #218838; }
    </style>
</head>
<body>
    <h1>Admin Panel - Withdrawal Requests</h1>
    
    <div class="payment-box">
        <p><strong>বিকাশ (Bkash):</strong> 01829167126</p>
        <p><strong>নগদ/রকেট (Nagad/Rocket):</strong> 01708711771</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>User Name</th>
                <th>Amount</th>
                <th>Payment Number</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="requestTable"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBXZwXKgN7aJglLxJaKPE4l7ehLTJO_jM",
            authDomain: "microbilogy-hub.firebaseapp.com",
            projectId: "microbilogy-hub",
            storageBucket: "microbilogy-hub.firebasestorage.app",
            messagingSenderId: "97322008506",
            appId: "1:97322008506:web:e1ef46ddf6ecbc2095a783",
            measurementId: "G-83EM9RS8VS"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const adminEmails = ["alnafiulhassan@gmail.com"]; 

        onAuthStateChanged(auth, (user) => {
            if (!user || !adminEmails.includes(user.email)) {
                alert("Access Denied! You are not an admin.");
                window.location.href = "index.html";
            }
        });

        // ডেটা লোড করা
        onSnapshot(collection(db, "withdraw_requests"), (snapshot) => {
            const table = document.getElementById("requestTable");
            table.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if(data.status === "Pending") {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${data.name || 'N/A'}</td>
                        <td>${data.requestedAmount}</td>
                        <td>${data.number}</td>
                        <td>${data.status}</td>
                        <td><button class="btn-approve" id="btn-${docSnap.id}">Approve</button></td>
                    `;
                    table.appendChild(row);

                    // বাটন ইভেন্ট লিসেনার
                    document.getElementById(`btn-${docSnap.id}`).onclick = async () => {
                        await updateDoc(doc(db, "withdraw_requests", docSnap.id), { status: "Approved" });
                        alert("Payment Approved!");
                    };
                }
            });
        });
    </script>
</body>
</html>
